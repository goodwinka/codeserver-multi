services:
  codeserver-multi:
    build: .
    image: codeserver-multi:latest
    container_name: codeserver-multi
    ports:
      - "8080:8080"
    volumes:
      # User home directories — bind-mount from host.
      # Каждая подпапка внутри — это отдельный пользователь: ./users/alice, ./users/bob, ...
      - ./users:/users
      # Конфиг (users.json и т.п.) — чтобы переживал пересборку контейнера
      - ./config:/config
      # Общие расширения — один раз установил, доступны всем
      - shared-extensions:/opt/shared-extensions
    environment:
      # Меняйте перед первым запуском!
      SESSION_SECRET: "change-me-please-${RANDOM}${RANDOM}"
      # Администратор создаётся при первом старте, если его ещё нет в users.json
      BOOTSTRAP_ADMIN_USER: "admin123"
      BOOTSTRAP_ADMIN_PASSWORD: "admin123"
      # Имя cookie с сессией
      SESSION_COOKIE_NAME: "cs_sid"
    restart: unless-stopped
    # code-server любит много file watchers
    ulimits:
      nofile:
        soft: 65536
        hard: 65536

volumes:
  shared-extensions:
